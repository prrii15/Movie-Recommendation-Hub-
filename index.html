<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Hub</title>
    <link rel="stylesheet" href="style.css">
                                                                        
</head>
<body background="image.png.jpg">
    <header>
        <h1>Movie Hub</h1>
        <div class="top-right">
            <a href="login.html" class="login-btn">Login</a>
            <i class="fa-solid fa-gear settings-icon"></i>
        </div>
        <form>
            <input type="search" list="movie-suggestions" placeholder="Search for movies...">
            <datalist id="movie-suggestions">
                <option value="The Shawshank Redemption">
                <option value="The Godfather">
                <option value="The Dark Knight">
                <option value="12 Angry Men">
                <option value="Schindler's List">
                <option value="The Lord of the Rings: The Return of the King">
                <option value="Pulp Fiction">
                <option value="The Good, the Bad and the Ugly">
                <option value="The Matrix">
                <option value="Forrest Gump">
                <option value="Inception">
                <option value="Interstellar">
                <option value="The Silence of the Lambs">
                <option value="Se7en">
                <option value="The Prestige">
            </datalist>
            <button>Search</button>
        </form>
    </header>
    <main>
        <!-- Movie recommendations will be displayed here -->
    </main>
</body>
</html>
